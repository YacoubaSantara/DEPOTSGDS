
<style>
/* ── Boutons Aperçu/Imprimer (screen) ─────────────────────── */
.btn-print-main{
  display:inline-flex;align-items:center;gap:7px;
  padding:9px 18px;background:var(--navy);color:#fff;
  border:none;border-radius:8px;font-size:.82rem;font-weight:600;
  cursor:pointer;transition:all .2s;font-family:inherit
}
.btn-print-main:hover{background:#16304f;transform:translateY(-1px);box-shadow:0 4px 14px rgba(30,58,95,.3)}
.btn-export-main{
  display:inline-flex;align-items:center;gap:7px;
  padding:9px 18px;background:#16a34a;color:#fff;
  border-radius:8px;font-size:.82rem;font-weight:600;
  text-decoration:none;transition:all .2s
}
.btn-export-main:hover{background:#15803d;transform:translateY(-1px)}

[data-theme="dark"] .btn-print-main{background:var(--accent);color:#fff}
[data-theme="dark"] .btn-print-main:hover{background:var(--accent-2);box-shadow:0 4px 14px rgba(212,104,31,.3)}
[data-theme="dark"] .btn-export-main{background:var(--ok);color:#fff}
[data-theme="dark"] .btn-export-main:hover{background:var(--ok);filter:brightness(1.1)}

/* ── Éléments d'impression masqués à l'écran ─────────────── */
.print-header,.print-footer{ display:none }

/* ═══════════════════════════════════════════════════════
   VARIABLES D'IMPRESSION
═══════════════════════════════════════════════════════ */
:root{
  --ink-p:#0f2547;
  --navy:#1e3a5f;
  --navy-l:#2c5285;
  --muted-p:#64748b;
  --muted-p2:#94a3b8;
  --border-p:#d4dae3;
  --border-pl:#e2e8f0;
  --bg-p:#f8fafc;
  --bg-p2:#f1f5f9;

  --green-p:#15803d;  --green-bg:#f0fdf4;  --green-bg2:#dcfce7;
  --red-p:#b91c1c;    --red-bg:#fef2f2;    --red-bg2:#fee2e2;
  --blue-p:#1e40af;   --blue-bg:#eff6ff;   --blue-bg2:#dbeafe;
  --amber-p:#92400e;  --amber-bg:#fffbeb;  --amber-bg2:#fef3c7;

  --report-bg:#e0ecff;
  --total-bg:#e8f0fe;
}

/* ═══════════════════════════════════════════════════════
   @MEDIA PRINT
═══════════════════════════════════════════════════════ */
@media print{
  /* Cacher la chrome de l'app */
  .topbar,.sidebar,.breadcrumb-bar,
  .filters-bar,.filter-bar,.page-header,.ph,.ph-actions,
  .btn-print-main,.btn-export-main,.btn,.no-print,
  .btn-filter,.btn-reset,.toast-container,.btn-print,
  nav,.nav,#sidebar,form.filter-form,
  .mkt-panel,.etat-layout > aside { display:none !important }

  /* Réinitialisation */
  html,body{ margin:0;padding:0;background:#fff;font-size:9pt;color:#000 }
  body{ font-family:'Helvetica Neue',Arial,sans-serif }
  .main-content,.content-wrapper,main,
  [class*="content"],[class*="wrapper"]{
    margin:0 !important;padding:0 !important;
    width:100% !important;max-width:none !important;
    box-shadow:none !important
  }

  /* Afficher en-tête et pied de page */
  .print-header{ display:block !important }
  .print-footer{ display:block !important;margin-top:auto;padding-top:8px }

  /* ── En-tête officiel ── */
  .ph-band{
    display:grid;grid-template-columns:56px 1fr auto;
    gap:12px;align-items:center
  }
  .ph-logo{
    width:56px;height:56px;
    border:1.5px solid var(--ink-p);border-radius:4px;
    display:flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg,var(--ink-p),var(--navy-l));
    color:#fff;font-family:'Arial Black',Arial,sans-serif;
    font-size:13pt;font-weight:900;letter-spacing:-.02em;
    -webkit-print-color-adjust:exact;print-color-adjust:exact
  }
  .ph-logo-text{
    font-family:'Arial Black',Arial,sans-serif;
    font-size:12pt;font-weight:900;letter-spacing:-.05em;
    line-height:1;display:flex;flex-direction:column;align-items:center
  }
  .ph-logo-text small{font-size:5.5pt;font-weight:600;margin-top:2px;opacity:.85;letter-spacing:0}
  .ph-co{display:flex;flex-direction:column;gap:1px}
  .ph-co-name{
    font-family:'Arial Black',Arial,sans-serif;
    font-size:14pt;font-weight:900;color:var(--ink-p);
    letter-spacing:.01em;line-height:1.1
  }
  .ph-co-sub{ font-size:7.5pt;color:var(--muted-p);line-height:1.3 }
  .ph-co-sub strong{ color:#334155;font-weight:700 }
  .ph-meta{ text-align:right;font-size:7.2pt;color:var(--muted-p);line-height:1.5;white-space:nowrap }
  .ph-meta strong{ color:var(--ink-p);font-weight:700 }
  .ph-meta-mat{ font-size:6.5pt;color:var(--muted-p2) }

  .ph-rule{
    height:3px;background:var(--ink-p);margin:2px 0 3px;position:relative;
    -webkit-print-color-adjust:exact;print-color-adjust:exact
  }
  .ph-rule::after{
    content:'';position:absolute;left:0;bottom:-3px;
    width:80px;height:1.5px;background:var(--navy-l);
    -webkit-print-color-adjust:exact;print-color-adjust:exact
  }
  .ph-title-wrap{ text-align:center;margin:1px 0 4px }
  .ph-title{
    font-family:'Arial Black',Arial,sans-serif;font-size:14pt;font-weight:900;
    color:var(--ink-p);letter-spacing:.08em;text-transform:uppercase;line-height:1.1
  }
  .ph-subtitle{ font-size:8.5pt;color:#475569;margin-top:3px }
  .ph-subtitle strong{ color:var(--ink-p);font-weight:700 }

  /* ── Bandeau méta ── */
  .meta-band{
    display:grid;border:1px solid var(--ink-p);border-radius:2px;
    overflow:hidden;background:#fff;
    -webkit-print-color-adjust:exact;print-color-adjust:exact
  }
  .meta-cell{
    padding:5px 10px;border-right:1px solid #c0cad8;
    font-size:7.5pt;display:flex;flex-direction:column;gap:1px;min-width:0
  }
  .meta-cell:last-child{ border-right:none }
  .meta-cell.dark{
    background:var(--ink-p);color:#fff;
    -webkit-print-color-adjust:exact;print-color-adjust:exact
  }
  .meta-cell.dark .meta-label{ color:rgba(255,255,255,.65) }
  .meta-cell.dark .meta-val{ color:#fff }
  .meta-label{
    font-size:6.4pt;font-weight:700;text-transform:uppercase;
    letter-spacing:.08em;color:var(--muted-p)
  }
  .meta-val{ font-size:9pt;font-weight:700;color:var(--ink-p);line-height:1.15 }
  .meta-val.green{ color:var(--green-p) }
  .meta-val.red{ color:var(--red-p) }
  .meta-val.navy{ color:var(--navy-l) }
  .meta-val.amber{ color:var(--amber-p) }

  /* ── Tableaux ── */
  .tbl-wrap{
    border:1.2px solid var(--ink-p);border-radius:2px;
    overflow:visible;margin-bottom:8px;
    -webkit-print-color-adjust:exact;print-color-adjust:exact
  }
  table,table.tbl{ width:100%;border-collapse:collapse;font-size:7.6pt;page-break-inside:auto }
  thead,thead.tbl{ display:table-header-group }
  tfoot{ display:table-footer-group }
  tr{ page-break-inside:avoid }

  table.tbl thead th,thead th,th{
    background:var(--ink-p) !important;
    color:#fff !important;
    padding:5px 6px;
    font-size:6.8pt;font-weight:700;
    letter-spacing:.04em;text-transform:uppercase;
    border:1px solid #0a1d3c;
    border-bottom:1.5px solid #000;
    text-align:center;vertical-align:middle;
    -webkit-print-color-adjust:exact;print-color-adjust:exact
  }
  th.sub{
    background:var(--navy-l) !important;
    font-size:6.3pt;border-color:#1e3a5f;
    -webkit-print-color-adjust:exact;print-color-adjust:exact
  }
  th.left{ text-align:left }
  th.right{ text-align:right }

  td{
    padding:4px 7px;
    border-bottom:1px solid #e6ebf2;
    border-right:1px solid #f1f5f9;
    font-size:7.6pt;color:#0b1220;vertical-align:middle
  }
  td.right{ text-align:right }
  td.center{ text-align:center }
  tr:hover td{ background:transparent }

  /* ── Colonnes numériques ── */
  .num{
    font-family:'SF Mono','JetBrains Mono',Menlo,Consolas,monospace;
    font-size:7.5pt;font-variant-numeric:tabular-nums;text-align:right
  }
  .num-pos,.num-stock-ok{ color:var(--green-p) !important;font-weight:700 }
  .num-neg,.num-stock-neg{ color:var(--red-p) !important;font-weight:700 }
  .num-stk,.num-stock{ color:var(--navy-l) !important;font-weight:700 }
  .num-warn{ color:var(--amber-p) !important;font-weight:700 }
  .num-mut,.num-zero{ color:var(--muted-p2);opacity:.7 }

  /* Aliases compat ancien code */
  .num-stock,.num-stock-val{ color:var(--navy-l) !important;font-weight:700 }

  /* ── Lignes spéciales ── */
  tr.row-report td,tr.row-ouverture td{
    background:var(--report-bg) !important;font-weight:700;color:var(--navy);
    -webkit-print-color-adjust:exact;print-color-adjust:exact
  }
  tr.row-total td,tr.row-cumul td{
    background:var(--total-bg) !important;font-weight:700;
    border-top:2px solid var(--ink-p) !important;
    -webkit-print-color-adjust:exact;print-color-adjust:exact
  }
  tr.row-subtotal td,tr.total-row td{
    background:#eef2f7 !important;font-weight:700;
    border-top:1px solid var(--navy-l);
    -webkit-print-color-adjust:exact;print-color-adjust:exact
  }
  tr.row-entree td,tr.row-entrees td{
    background:#f4fbf6 !important;
    -webkit-print-color-adjust:exact;print-color-adjust:exact
  }
  tr.row-sortie td,tr.row-sorties td{
    background:#fdf5f5 !important;
    -webkit-print-color-adjust:exact;print-color-adjust:exact
  }
  tr.row-cession td,tr.row-comptable td{
    background:#f5f8fd !important;
    -webkit-print-color-adjust:exact;print-color-adjust:exact
  }
  tr.row-acquit td,tr.row-acquittement td{
    background:#fefaf0 !important;
    -webkit-print-color-adjust:exact;print-color-adjust:exact
  }
  tr.section-header td{
    background:#f0f4f8 !important;font-weight:700;color:var(--navy);
    font-size:7.8pt;text-transform:uppercase;letter-spacing:.04em;
    -webkit-print-color-adjust:exact;print-color-adjust:exact
  }
  tr.stock-fin-row td{
    background:#fffde7 !important;font-weight:700;
    border-top:2px solid #e6b800;
    -webkit-print-color-adjust:exact;print-color-adjust:exact
  }
  tr.physique-row td{
    background:#e8f5e9 !important;font-weight:700;
    -webkit-print-color-adjust:exact;print-color-adjust:exact
  }
  tr.perte-row td{
    background:#fce8e6 !important;color:#c62828;font-weight:700;
    -webkit-print-color-adjust:exact;print-color-adjust:exact
  }
  tr.gain-row td{
    background:#e8f5e9 !important;color:#2e7d32;font-weight:700;
    -webkit-print-color-adjust:exact;print-color-adjust:exact
  }
  tr.row-pg td{
    background:var(--red-bg) !important;
    -webkit-print-color-adjust:exact;print-color-adjust:exact
  }
  tr.row-ratio td{
    background:#f8fafc !important;
    -webkit-print-color-adjust:exact;print-color-adjust:exact
  }
  tr.row-fermeture td{
    background:var(--green-bg) !important;font-weight:700;
    -webkit-print-color-adjust:exact;print-color-adjust:exact
  }

  /* ── Badges ── */
  .bdg,.badge{
    display:inline-block;padding:1px 5px;border-radius:3px;
    font-size:6.5pt;font-weight:700;letter-spacing:.03em;white-space:nowrap
  }
  .bdg-entree,.badge-entree{ background:var(--green-bg2) !important;color:var(--green-p);-webkit-print-color-adjust:exact;print-color-adjust:exact }
  .bdg-sortie,.badge-sortie{ background:var(--red-bg2) !important;color:var(--red-p);-webkit-print-color-adjust:exact;print-color-adjust:exact }
  .bdg-cession,.badge-cession{ background:var(--blue-bg2) !important;color:var(--blue-p);-webkit-print-color-adjust:exact;print-color-adjust:exact }
  .bdg-acquit,.badge-acquit{ background:var(--amber-bg2) !important;color:var(--amber-p);-webkit-print-color-adjust:exact;print-color-adjust:exact }
  .bdg-sd,.badge-sd{ background:var(--amber-bg) !important;color:var(--amber-p);border:1px solid #fde68a;-webkit-print-color-adjust:exact;print-color-adjust:exact }
  .bdg-ac,.badge-ac{ background:var(--green-bg) !important;color:var(--green-p);border:1px solid #bbf7d0;-webkit-print-color-adjust:exact;print-color-adjust:exact }
  .bdg-mkt,.badge-mkt{ background:#e0f2fe !important;color:#0c4a6e;border:1px solid #bae6fd;-webkit-print-color-adjust:exact;print-color-adjust:exact }
  .bdg-valide,.badge-valide{ background:var(--green-bg2) !important;color:var(--green-p);-webkit-print-color-adjust:exact;print-color-adjust:exact }
  .bdg-nv,.badge-nv{ background:var(--amber-bg2) !important;color:var(--amber-p);-webkit-print-color-adjust:exact;print-color-adjust:exact }
  .badge-green{ border-color:#166534 !important;color:#166534 !important }
  .badge-red{ border-color:#b91c1c !important;color:#b91c1c !important }

  /* ── Section banners ── */
  .section-banner{
    background:var(--ink-p) !important;color:#fff;
    padding:5px 10px;font-size:8pt;font-weight:700;
    letter-spacing:.06em;text-transform:uppercase;border-radius:2px 2px 0 0;
    -webkit-print-color-adjust:exact;print-color-adjust:exact
  }
  .section-banner.green{ background:var(--green-p) !important;-webkit-print-color-adjust:exact;print-color-adjust:exact }
  .section-banner.red{ background:var(--red-p) !important;-webkit-print-color-adjust:exact;print-color-adjust:exact }
  .section-banner.blue{ background:var(--blue-p) !important;-webkit-print-color-adjust:exact;print-color-adjust:exact }
  .section-banner.amber{ background:var(--amber-p) !important;-webkit-print-color-adjust:exact;print-color-adjust:exact }

  /* Titres de sections (ancien code) */
  .section-title{ padding:5px 8px !important;font-size:9pt !important;border-bottom:1px solid var(--border-p) }
  .section-entree .section-title{ background:#dcfce7 !important;color:#166534 !important;-webkit-print-color-adjust:exact;print-color-adjust:exact }
  .section-sortie .section-title{ background:#fee2e2 !important;color:#991b1b !important;-webkit-print-color-adjust:exact;print-color-adjust:exact }
  .section-cession .section-title{ background:#dbeafe !important;color:#1e40af !important;-webkit-print-color-adjust:exact;print-color-adjust:exact }
  .section-acquittement .section-title{ background:#fef3c7 !important;color:#92400e !important;-webkit-print-color-adjust:exact;print-color-adjust:exact }
  .produit-title{
    background:var(--navy) !important;color:#fff !important;
    padding:5px 10px;font-size:8pt;font-weight:700;
    -webkit-print-color-adjust:exact;print-color-adjust:exact
  }

  /* ── Mini-band ── */
  .mini-band{
    display:flex;align-items:center;gap:8px;
    padding:4px 10px;background:var(--bg-p2) !important;
    border-left:3px solid var(--ink-p);
    font-size:7.5pt;color:#334155;
    -webkit-print-color-adjust:exact;print-color-adjust:exact
  }
  .mini-band strong{ color:var(--ink-p);font-weight:700 }

  /* ── KPI row ── */
  .kpi-row{
    display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:6px
  }
  .kpi{
    border:1px solid var(--border-p);border-radius:2px;
    padding:5px 8px;background:#fcfdfe !important;
    display:flex;flex-direction:column;gap:1px;
    -webkit-print-color-adjust:exact;print-color-adjust:exact
  }
  .kpi-l{
    font-size:6.3pt;font-weight:700;text-transform:uppercase;
    letter-spacing:.07em;color:var(--muted-p)
  }
  .kpi-v{
    font-family:'SF Mono',Menlo,monospace;
    font-size:9pt;font-weight:700;color:var(--ink-p);font-variant-numeric:tabular-nums
  }
  .kpi.green .kpi-v{ color:var(--green-p) }
  .kpi.red .kpi-v{ color:var(--red-p) }
  .kpi.amber .kpi-v{ color:var(--amber-p) }
  .kpi.navy .kpi-v{ color:var(--navy-l) }

  /* ── Pied de page d'état ── */
  .print-footer{
    border-top:1px solid var(--border-p);padding-top:5px;
    display:grid !important;
    grid-template-columns:1fr 1fr 1fr;
    gap:14px;align-items:end;
    font-size:7pt;color:var(--muted-p)
  }
  .pf-block{ display:flex;flex-direction:column;gap:1px }
  .pf-label{
    font-size:6pt;font-weight:700;
    text-transform:uppercase;letter-spacing:.08em;color:var(--muted-p2)
  }
  .pf-ref{ font-family:'SF Mono',Menlo,monospace;font-size:7pt;color:var(--ink-p);font-weight:600 }
  .pf-sigs{ display:flex;gap:10px;justify-content:center;align-items:flex-end }
  .pf-sig-block{ flex:1;text-align:center }
  .pf-sig{
    border-top:1px solid var(--ink-p);padding-top:2px;margin-top:14px;
    font-size:6.8pt;color:var(--muted-p);text-align:center
  }
  .pf-page{
    font-family:'SF Mono',Menlo,monospace;font-size:6.8pt;
    color:var(--muted-p);text-align:right
  }
  .pf-page strong{ color:var(--ink-p);font-weight:700 }
  .tiny{ font-size:6.5pt;color:var(--muted-p) }

  /* ── Réglage de page ── */
  @page{
    margin:12mm 10mm 16mm 10mm;
    size:A4 landscape;
  }
}
</style>

<script>
(function(){
  function _getDateStr(){
    var now = new Date();
    return now.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'})
      + ' à ' + now.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
  }
  function _setDateEl(){
    var el = document.getElementById('print-date-val');
    if(el) el.textContent = _getDateStr();
  }
  document.addEventListener('DOMContentLoaded', _setDateEl);
  window.lancerImpression = function(){ _setDateEl(); window.print(); };
})();
</script>
