<div style="position:relative;display:inline-block;" id="depot-dropdown-wrap">

  {% if est_superadmin %}
  <!-- ── SUPERADMIN : switcher ── -->
  <button onclick="toggleDepotMenu()" type="button"
          style="display:inline-flex;align-items:center;gap:.4rem;background:#e0ecff;color:#1e3a5f;padding:.32rem .85rem;border-radius:9999px;font-size:.78rem;font-weight:700;border:1px solid #bfdbfe;cursor:pointer;white-space:nowrap;">
    <svg style="width:.85rem;height:.85rem;stroke:currentColor;fill:none;stroke-width:2;" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    {% if depot %}{{ depot.nom }}{% else %}Vue consolidée{% endif %}
    <svg style="width:.7rem;height:.7rem;stroke:currentColor;fill:none;stroke-width:2.5;" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
  </button>

  <div id="depot-menu"
       style="display:none;position:absolute;right:0;top:calc(100% + .4rem);background:#fff;border:1px solid #e2e8f0;border-radius:.625rem;box-shadow:0 8px 24px rgba(30,58,95,.15);min-width:220px;z-index:9999;overflow:hidden;">
    <div style="padding:.5rem .75rem;font-size:.7rem;font-weight:700;color:#94a3b8;letter-spacing:.08em;text-transform:uppercase;background:#f8fafc;border-bottom:1px solid #f1f5f9;">
      Basculer de dépôt
    </div>
    <form method="post" action="{% url 'changer_depot_actif' %}">
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ request.path }}">
      <button type="submit" name="depot_id" value="TOUS"
              style="display:flex;align-items:center;gap:.6rem;width:100%;background:none;border:none;padding:.65rem 1rem;font-size:.85rem;color:#1e293b;cursor:pointer;font-family:inherit;text-align:left;{% if not depot %}font-weight:700{% endif %}"
              onmouseover="this.style.background='#f8fafc'" onmouseout="this.style.background=''">
        <svg style="width:1rem;height:1rem;stroke:#6366f1;fill:none;stroke-width:2;flex-shrink:0;" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Vue consolidée (tous dépôts)
      </button>
      {% for dep in depots_actifs %}
      <button type="submit" name="depot_id" value="{{ dep.pk }}"
              style="display:flex;align-items:center;gap:.6rem;width:100%;background:none;border:none;padding:.65rem 1rem;font-size:.85rem;color:#1e293b;cursor:pointer;font-family:inherit;text-align:left;border-top:1px solid #f1f5f9;{% if depot and depot.pk == dep.pk %}font-weight:700{% endif %}"
              onmouseover="this.style.background='#f8fafc'" onmouseout="this.style.background=''">
        <svg style="width:1rem;height:1rem;stroke:#16a34a;fill:none;stroke-width:2;flex-shrink:0;" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        {{ dep.nom }}
      </button>
      {% endfor %}
    </form>
    <a href="{% url 'depot_liste' %}"
       style="display:flex;align-items:center;gap:.6rem;padding:.65rem 1rem;font-size:.85rem;color:#475569;text-decoration:none;border-top:1px solid #f1f5f9;"
       onmouseover="this.style.background='#f8fafc'" onmouseout="this.style.background=''">
      <svg style="width:1rem;height:1rem;stroke:#64748b;fill:none;stroke-width:2;flex-shrink:0;" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
      Gérer les dépôts
    </a>
  </div>

  {% elif multi_depot %}
  <!-- ── Rôle rattaché à plusieurs dépôts : switcher limité à ses dépôts ── -->
  <button onclick="toggleDepotMenu()" type="button"
          style="display:inline-flex;align-items:center;gap:.4rem;background:#e0ecff;color:#1e3a5f;padding:.32rem .85rem;border-radius:9999px;font-size:.78rem;font-weight:700;border:1px solid #bfdbfe;cursor:pointer;white-space:nowrap;">
    <svg style="width:.85rem;height:.85rem;stroke:currentColor;fill:none;stroke-width:2;" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    {{ depot.nom|default:"Choisir un dépôt" }}
    <svg style="width:.7rem;height:.7rem;stroke:currentColor;fill:none;stroke-width:2.5;" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
  </button>

  <div id="depot-menu"
       style="display:none;position:absolute;right:0;top:calc(100% + .4rem);background:#fff;border:1px solid #e2e8f0;border-radius:.625rem;box-shadow:0 8px 24px rgba(30,58,95,.15);min-width:220px;z-index:9999;overflow:hidden;">
    <div style="padding:.5rem .75rem;font-size:.7rem;font-weight:700;color:#94a3b8;letter-spacing:.08em;text-transform:uppercase;background:#f8fafc;border-bottom:1px solid #f1f5f9;">
      Basculer de dépôt
    </div>
    <form method="post" action="{% url 'changer_depot_actif' %}">
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ request.path }}">
      {% for dep in mes_depots %}
      <button type="submit" name="depot_id" value="{{ dep.pk }}"
              style="display:flex;align-items:center;gap:.6rem;width:100%;background:none;border:none;padding:.65rem 1rem;font-size:.85rem;color:#1e293b;cursor:pointer;font-family:inherit;text-align:left;{% if forloop.first %}border-top:none;{% else %}border-top:1px solid #f1f5f9;{% endif %}{% if depot and depot.pk == dep.pk %}font-weight:700{% endif %}"
              onmouseover="this.style.background='#f8fafc'" onmouseout="this.style.background=''">
        <svg style="width:1rem;height:1rem;stroke:#16a34a;fill:none;stroke-width:2;flex-shrink:0;" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        {{ dep.nom }}
      </button>
      {% endfor %}
    </form>
  </div>

  {% elif depot %}
  <!-- ── Rôle rattaché à un dépôt fixe : badge statique ── -->
  <span style="display:inline-flex;align-items:center;gap:.4rem;background:#f1f5f9;color:#475569;padding:.32rem .85rem;border-radius:9999px;font-size:.78rem;font-weight:700;border:1px solid #e2e8f0;white-space:nowrap;">
    <svg style="width:.85rem;height:.85rem;stroke:currentColor;fill:none;stroke-width:2;" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    {{ depot.nom }}
  </span>
  {% endif %}

</div>

<script>
function toggleDepotMenu() {
  var m = document.getElementById('depot-menu');
  if (m) m.style.display = m.style.display === 'none' ? 'block' : 'none';
}
document.addEventListener('click', function(e) {
  var wrap = document.getElementById('depot-dropdown-wrap');
  if (wrap && !wrap.contains(e.target)) {
    var m = document.getElementById('depot-menu');
    if (m) m.style.display = 'none';
  }
});
</script>
