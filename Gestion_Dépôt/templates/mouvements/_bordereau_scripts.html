{% comment %}Script JS commun : code-barres scannable (Code128) + auto-print.{% endcomment %}
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
<script>
  document.querySelectorAll('.barcode').forEach(bar => {
    const ref = bar.dataset.ref || '';
    if (ref && window.JsBarcode) {
      JsBarcode(bar, ref, {
        format: 'CODE128',
        displayValue: false,
        height: 30,
        width: 1.4,
        margin: 0,
        background: 'transparent',
        lineColor: '#1a1814',
      });
    }
  });
  {% if auto_print %}window.addEventListener('load', () => setTimeout(() => window.print(), 250));{% endif %}
</script>
