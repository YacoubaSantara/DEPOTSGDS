{% extends 'base.html' %}
{% block title %}Déconnexion{% endblock %}

{% block content %}
<div style="max-width:480px;margin:80px auto;text-align:center">
  <div style="width:72px;height:72px;border-radius:50%;background:#fee2e2;display:flex;align-items:center;justify-content:center;margin:0 auto 24px">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2">
      <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
      <polyline points="16 17 21 12 16 7"/>
      <line x1="21" y1="12" x2="9" y2="12"/>
    </svg>
  </div>
  <h2 style="font-family:inherit;font-size:1.4rem;font-weight:700;color:var(--text);margin-bottom:10px">
    Confirmer la déconnexion
  </h2>
  <p style="color:var(--muted);font-size:.9rem;margin-bottom:32px;line-height:1.6">
    Vous êtes sur le point de vous déconnecter de <strong>SGDS</strong>.<br/>
    Êtes-vous sûr de vouloir continuer ?
  </p>
  <div style="display:flex;gap:12px;justify-content:center">
    <a href="javascript:history.back()" class="btn btn-secondary">Annuler</a>
    <form method="post" action="{% url 'deconnexion' %}">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger" style="background:#ef4444;color:#fff;border:none">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Oui, me déconnecter
      </button>
    </form>
  </div>
</div>
{% endblock %}
